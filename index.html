<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蚁人行动 × 蛋仔派对分组系统 - 课堂版</title>
    <style>
        :root {
            --eggy-yellow: #FFD700;
            --eggy-orange: #FFA500;
            --eggy-blue: #87CEFA;
            --ant-quantum-blue: #4D94FF; /* 量子蓝 */
            --ant-power-red: #FF4D4D;   /* 强力红 */
            --ant-tech-green: #4DFF4D;   /* 科技绿 */
            --ant-mech-purple: #B84DFF;  /* 机械紫 */
            --ant-flight-yellow: #FFD700; /* 飞行黄 */
            --text-dark: #333;
        }
        body {
            font-family: 'Comic Sans MS', 'Microsoft YaHei', sans-serif;
            background-color: var(--eggy-yellow);
            /* --- 用户需求：启用上传的图片作为背景 --- */
            background-image: url('eggy_bg.jpg');
            background-size: cover;
            background-attachment: fixed; /* 保持背景固定，效果更好 */
            background-position: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #FF4500;
            text-shadow: 2px 2px 0px #FFF;
            font-size: 2.5em;
            display: flex;
            align-items: center;
        }
        .header-icon {
            width: 32px; /* 调整标题图标大小 */
            height: 32px;
            vertical-align: middle;
            margin-right: 12px;
            margin-bottom: 5px; /* 对齐文本 */
        }
        .setup-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            border: 4px solid var(--eggy-orange);
        }
        select, button {
            font-size: 1.2em;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 10px;
            border: 2px solid var(--eggy-orange);
            cursor: pointer;
        }
        button {
            background-color: #FF4500;
            color: white;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.95);
        }
        .game-area {
            display: flex;
            width: 100%;
            max-width: 1100px;
            gap: 20px;
            display: none; /* 初始隐藏 */
        }
        .sidebar {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            border: 4px solid var(--eggy-blue);
            min-height: 400px;
            overflow-y: auto; /* 内容过多可滚动 */
        }
        .draw-area {
            flex: 3;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-content: flex-start;
        }
        .card {
            width: 130px;
            height: 170px;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }
        .card-front {
            background: linear-gradient(135deg, #FFDEAD, var(--eggy-orange));
            color: white;
        }
        .card-front::after { content: "？\A抽我!"; white-space: pre; font-size:1.1em; }
        .card-back {
            transform: rotateY(180deg);
            background-color: white;
            flex-direction: column;
            padding: 10px;
            justify-content: flex-start; /* 顶部对齐 */
        }
        .back-icon {
            width: 70px; /* 调整卡片内图标大小 */
            height: 70px;
            border-radius: 50%; /* 圆形图标 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .team-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 0 #333; /* 提高深色文字背景上的清晰度 */
        }
    </style>
</head>
<body>

    <h1>
        <img src="eggy_icon.png" alt="Eggy" class="header-icon"> 
        蚁人Antman × 蛋仔派对分组系统 🕶️
    </h1>

    <div class="setup-container" id="setupUI">
        <label for="studentCount"><strong>今天到场了几位小蚁人特工？</strong></label>
        <select id="studentCount">
            <option value="4">4 人</option>
            <option value="5">5 人</option>
            <option value="6">6 人</option>
            <option value="7">7 人</option>
            <option value="8">8 人</option>
            <option value="9">9 人</option>
            <option value="10">10 人</option>
        </select>
        <button onclick="startGame()">开始报到 (生成盲盒)</button>
    </div>

    <div class="game-area" id="gameArea">
        <div class="sidebar">
            <h2>蚁人行动简报 📝</h2>
            <div id="resultsList"></div>
        </div>
        <div class="draw-area" id="drawArea">
            </div>
    </div>

    <script>
        // 定义可行的分组策略 (保持 2-4 人一组)
        const strategies = {
            4: [[2, 2], [4]],
            5: [[2, 3]],
            6: [[2, 2, 2], [3, 3], [2, 4]],
            7: [[2, 2, 3], [3, 4]],
            8: [[2, 2, 2, 2], [2, 3, 3], [4, 4]],
            9: [[3, 3, 3], [2, 3, 4]],
            10: [[3, 3, 4], [2, 4, 4], [2, 2, 3, 3]]
        };

        // --- 用户需求：将队伍文字换成不同的蛋仔角色 ---
        // 定义新角色：名称 + 颜色 + 颜色描述
        const eggyCharacters = [
            { name: "量子蚁人蛋", color: "#4D94FF", colorName: "蓝色行动队" },
            { name: "强力机甲蛋", color: "#FF4D4D", colorName: "红色行动队" },
            { name: "科技闪电蛋", color: "#4DFF4D", colorName: "绿色行动队" },
            { name: "机械蛋仔", color: "#B84DFF", colorName: "紫色行动队" },
            { name: "飞行鹰蛋", color: "#FFD700", colorName: "黄色行动队" }
        ];

        let drawnCount = 0;

        function startGame() {
            const count = parseInt(document.getElementById('studentCount').value);
            const possibleStrats = strategies[count];
            const chosenStrat = possibleStrats[Math.floor(Math.random() * possibleStrats.length)];
            
            // 生成角色池
            let pool = [];
            for(let i = 0; i < chosenStrat.length; i++) {
                const teamSize = chosenStrat[i];
                for(let j = 0; j < teamSize; j++) {
                    pool.push(eggyCharacters[i]); // 每个策略组都有相同的角色
                }
            }
            
            // Fisher-Yates shuffle 打乱数组
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }

            // UI 切换
            document.getElementById('setupUI').style.display = 'none';
            document.getElementById('gameArea').style.display = 'flex';
            
            renderCards(pool);
        }

        // --- 用户需求：点击翻转后跳出图片角色 ---
        function renderCards(pool) {
            const drawArea = document.getElementById('drawArea');
            drawArea.innerHTML = '';
            document.getElementById('resultsList').innerHTML = '<p>等待蚁人报到...</p>';
            drawnCount = 0;

            pool.forEach((charData, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front"></div>
                        <div class="card-back" style="border: 5px solid ${charData.color}; justify-content:flex-start;">
                            <img src="eggy_icon.png" alt="Eggy" class="back-icon" style="border: 4px solid ${charData.color}">
                            <div style="color:${charData.color}; font-size:1.0em; font-weight:bold; margin-top:5px; text-shadow: 1px 1px 0 #FFF;">${charData.name}</div>
                            <div style="color:${charData.color}; font-size:0.85em; margin-top:2px;">(${charData.colorName})</div>
                        </div>
                    </div>
                `;
                
                // 点击翻牌事件
                card.onclick = function() {
                    if(!card.classList.contains('flipped')) {
                        card.classList.add('flipped');
                        drawnCount++;
                        updateSidebar(drawnCount, charData);
                    }
                };
                drawArea.appendChild(card);
            });
        }

        function updateSidebar(studentNumber, charData) {
            const resultsList = document.getElementById('resultsList');
            if(drawnCount === 1) resultsList.innerHTML = ''; // 清除提示词
            
            const item = document.createElement('div');
            item.className = 'team-result';
            item.style.backgroundColor = charData.color;
            // 使用新的角色名称
            item.innerText = `第 ${studentNumber} 个报到的蚁人加入了：${charData.name}（${charData.colorName}）`;
            
            // 插入到最前面，最新的抽签在最上面
            resultsList.insertBefore(item, resultsList.firstChild);
        }
    </script>
</body>
</html>
